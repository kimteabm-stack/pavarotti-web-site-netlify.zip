x #0008,0 0 46px #69dcff38}.visual{position:relative;height:590px}.visual .photo{height:100%}.gojo{position:absolute;right:-5%;bottom:-2%;width:42%;max-height:88%;object-fit:contain;filter:drop-shadow(0 0 26px #69dcff) drop-shadow(0 18px 24px #0009)}.note{position:absolute;right:3%;bottom:3%;border:1px solid #69dcff66;background:#071224cc;color:#dff8ff;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:800}.label{display:inline-flex;border:1px solid #69dcff88;background:#eafaff;color:#071224;border-radius:8px;padding:10px 14px;font-weight:900;box-shadow:0 0 26px #69dcff55}.panel,.card,.step,.voice,.event{border:1px solid #69dcff44;background:linear-gradient(135deg,#0b182dcc,#111d35d9);border-radius:8px;box-shadow:0 14px 28px #0005}.panel{padding:28px}.big,.quote{font-weight:900;color:#fff;text-shadow:0 0 22px #69dcff88}.big{font-size:38px;line-height:1.22;margin:0}.body{font-size:23px;line-height:1.45;color:#b8c9dd;margin:16px 0 0}.grid{display:grid;gap:18px;margin-top:24px}.two{grid-template-columns:repeat(2,1fr)}.three{grid-template-columns:repeat(3,1fr)}.four{grid-template-columns:repeat(4,1fr)}.card{min-height:142px;padding:22px;display:grid;align-content:start;gap:10px}.center{text-align:center;align-content:center}.card b{font-size:24px;color:#fff}.card small{font-size:18px;line-height:1.36;color:#b8c9dd}.tag{width:max-content;border-radius:8px;background:#eafaff;color:#071224;padding:7px 11px;font-size:14px;font-weight:900}.teal{background:#d8d4ff;color:#17113f}.blue{background:#d7e8ff;color:#081f4a}.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:24px}.step{padding:24px;min-height:220px}.step span,.year{font:900 34px Georgia,serif;color:#fff;text-shadow:0 0 18px #69dcffaa}.step b,.event b{display:block;color:#fff}.step b{margin:18px 0 8px;font-size:25px}.step p,.event p{margin:0;color:#b8c9dd;font-size:18px;line-height:1.35}.voices{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:20px}.voice{display:grid;grid-template-columns:84px 1fr;gap:18px;align-items:center;padding:18px}.letter{height:64px;border-radius:8px;display:grid;place-items:center;background:linear-gradient(135deg,#fff,#69dcff);color:#071224;font:900 25px Georgia,serif}.voice:nth-child(even) .letter{background:linear-gradient(135deg,#d8d4ff,#7b5cff);color:#fff}.voice b{font-size:24px;color:#fff}.voice small{display:block;margin-top:5px;color:#b8c9dd;font-size:17px;line-height:1.33}.timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px}.event{border-top:5px solid #69dcff;padding:22px;min-height:220px}.quote{font-size:34px;line-height:1.25;margin:0}.source{display:grid;grid-template-columns:48px 1.1fr 1fr 1.5fr;gap:16px;border-bottom:1px solid #69dcff33;padding:13px 0}.source b{font-size:19px;color:#fff}.source div{font-size:15px;color:#b8c9dd;line-height:1.3}.url{word-break:break-all;color:#9fd8ff!important;font-size:12px!important}.page{position:absolute;right:4.8%;bottom:3.6%;font-size:13px;color:#9fd8ff;font-weight:800}.nav{position:fixed;z-index:10;top:50%;transform:translateY(-50%);width:48px;height:72px;border:1px solid #69dcff55;border-radius:8px;background:#08152bcc;color:#eafaff;font-size:38px;font-weight:800;cursor:pointer;display:grid;place-items:center;box-shadow:0 0 28px #2d7dff4a}.nav:hover{background:#123465e8}.prev{left:18px}.next{right:18px}@media(max-width:820px){body{overflow:auto}#deck{display:block;height:auto}.slide{width:100%;height:auto;min-height:760px}.inner{padding:34px 28px 42px 40px}.slide:after{display:none}.title{font-size:34px}.lead{font-size:18px}.cover,.split,.wide,.two,.three,.four,.steps,.voices,.timeline{grid-template-columns:1fr}.cover .title{font-size:44px}.photo,.visual{height:260px}.gojo{width:34%;right:0}.card b{font-size:21px}.card small,.body{font-size:17px}.big,.quote{font-size:27px}.source{grid-template-columns:1fr}.nav{top:auto;bottom:14px;transform:none;width:46px;height:46px;font-size:30px}}</style></head><body><main id="deck"><section class="slide" id="s"></section></main><button class="nav prev" id="prev">‹</button><button class="nav next" id="next">›</button><script>const img1='https://upload.wikimedia.org/wikipedia/commons/5/54/Luciano_Pavarotti%2C_opera_star.jpg',img2='https://upload.wikimedia.org/wikipedia/commons/0/09/Luciano_Pavarotti_2004.jpg',img3='https://upload.wikimedia.org/wikipedia/commons/d/d9/Luciano_Pavarotti_in_Saint_Petersburg.jpg',gojo='https://jujutsukaisen.jp/images/chara_category6/chara_detail1_2nd.png';const slides=[['10208 김태범 발표','',`<div class="cover"><div><span class="label">무한의 목소리</span><p class="title">성악가란<br>무엇일까?</p><p class="lead"><b>루치아노 파바로티</b>를 대표 사례로 보면서 성악가가 하는 일, 필요한 역량, 성악가 안의 종류를 알아봅니다.</p></div><div class="visual"><img class="photo" src="${img1}"><img class="gojo" src="${gojo}"><div class="note">Theme visual · Satoru Gojo</div></div></div>`],['핵심 개념','01',`<div class="split"><div><p class="title">성악가는<br>목소리로 서사를 만드는 사람</p><p class="lead">성악은 단순히 큰 소리로 노래하는 것이 아니라, 호흡과 울림을 이용해 인물의 감정과 이야기를 관객에게 전달하는 예술입니다.</p></div><div class="panel"><p class="big">노래 + 언어 + 연기 + 몸의 사용</p><p class="body">이 네 가지가 합쳐질 때 우리가 무대에서 듣는 성악가의 목소리가 완성됩니다.</p></div></div>`],['발표 흐름','02',`<p class="title">오늘의 발표 구조</p><p class="lead">정의에서 시작해 필수 역량과 성악가의 종류를 본 뒤, 파바로티의 사례로 연결합니다.</p><div class="grid three"><div class="card"><span class="tag">1</span><b>성악가의 의미</b><small>목소리를 악기로 쓰는 직업</small></div><div class="card"><span class="tag teal">2</span><b>필수 역량</b><small>호흡, 발성, 언어, 해석, 무대 표현</small></div><div class="card"><span class="tag blue">3</span><b>성악가의 종류</b><small>음역과 활동 방식으로 나누기</small></div><div class="card"><span class="tag">4</span><b>파바로티</b><small>테너 성악가의 대표 사례</small></div><div class="card"><span class="tag teal">5</span><b>대표곡 감상</b><small>Nessun Dorma의 흐름</small></div><div class="card"><span class="tag blue">6</span><b>정리</b><small>성악가가 남기는 의미</small></div></div>`],['정의','03',`<div class="split wide"><div><p class="title">성악가란?</p><p class="lead">클래식 음악에서 훈련된 발성과 호흡으로 노래하며, 가사의 뜻과 인물의 감정을 무대에서 표현하는 예술가입니다.</p></div><div class="grid two"><div class="card"><span class="tag">기술</span><b>목소리를 안정적으로 울림</b><small>마이크 없이도 공간을 채우는 소리</small></div><div class="card"><span class="tag teal">표현</span><b>가사의 의미를 감정으로 전달</b><small>장면에 따라 소리의 색깔이 달라짐</small></div><div class="card"><span class="tag blue">무대</span><b>노래와 연기를 함께 수행</b><small>오페라에서는 배역으로 살아야 함</small></div><div class="card"><span class="tag">관리</span><b>몸 자체가 악기</b><small>컨디션과 생활 습관도 실력의 일부</small></div></div></div>`],['소리의 원리','04',`<p class="title">왜 마이크 없이도 들릴까?</p><p class="lead">성악은 목만 크게 쓰는 것이 아니라, 공기 흐름과 몸의 울림을 조절해 소리가 멀리 가게 만드는 기술입니다.</p><div class="steps"><div class="step"><span>01</span><b>호흡</b><p>긴 문장을 안정적으로 부를 수 있게 공기를 조절합니다.</p></div><div class="step"><span>02</span><b>성대</b><p>공기가 성대를 지나며 소리의 시작점을 만듭니다.</p></div><div class="step"><span>03</span><b>울림</b><p>입, 얼굴, 가슴 등 몸의 공간을 이용해 소리를 키웁니다.</p></div><div class="step"><span>04</span><b>표현</b><p>소리의 밝기와 세기를 조절해 감정을 전달합니다.</p></div></div>`],['필수 역량','05',`<p class="title">성악가에게 필요한 필수 역량</p><p class="lead">좋은 목소리 하나만으로는 부족합니다. 몸, 언어, 음악 해석, 무대 태도를 함께 갖춰야 합니다.</p><div class="grid three"><div class="card"><span class="tag">Breath</span><b>호흡 조절</b><small>긴 악구를 흔들리지 않게 이어 가는 힘</small></div><div class="card"><span class="tag teal">Tone</span><b>발성·공명</b><small>목에 무리 없이 멀리 가는 울림 만들기</small></div><div class="card"><span class="tag blue">Pitch</span><b>음정·리듬</b><small>오케스트라와 정확히 맞추는 기본기</small></div><div class="card"><span class="tag">Language</span><b>언어 능력</b><small>이탈리아어, 독일어, 프랑스어 가사 전달</small></div><div class="card"><span class="tag teal">Acting</span><b>감정·연기</b><small>배역의 성격과 장면의 분위기 표현</small></div><div class="card"><span class="tag blue">Care</span><b>자기 관리</b><small>목 건강, 체력, 긴장 조절, 꾸준한 훈련</small></div></div>`],['성악가의 종류','06',`<p class="title">음역에 따른 성악가의 종류</p><p class="lead">성악가는 목소리의 높낮이와 음색에 따라 역할이 나뉩니다. 파바로티는 높은 남성 음역인 <b>테너</b>입니다.</p><div class="voices"><div class="voice"><div class="letter">S</div><div><b>소프라노</b><small>가장 높은 여성 음역. 밝고 선명한 주인공 역할이 많습니다.</small></div></div><div class="voice"><div class="letter">M</div><div><b>메조소프라노</b><small>중간 여성 음역. 따뜻하고 깊은 색깔의 역할이 많습니다.</small></div></div><div class="voice"><div class="letter">A</div><div><b>알토·콘트랄토</b><small>낮은 여성 음역. 드물고 묵직한 음색이 특징입니다.</small></div></div><div class="voice"><div class="letter">T</div><div><b>테너</b><small>높은 남성 음역. 영웅이나 젊은 주인공 역할이 많습니다.</small></div></div><div class="voice"><div class="letter">B</div><div><b>바리톤</b><small>중간 남성 음역. 친구, 라이벌, 아버지 역할로 자주 등장합니다.</small></div></div><div class="voice"><div class="letter">Bs</div><div><b>베이스</b><small>가장 낮은 남성 음역. 왕, 노인, 권위 있는 인물에 어울립니다.</small></div></div></div>`],['성악가의 종류','07',`<p class="title">활동 방식에 따른 종류</p><p class="lead">모든 성악가가 같은 무대에 서는 것은 아닙니다. 어떤 음악을 주로 부르느냐에 따라 활동 모습도 달라집니다.</p><div class="grid four"><div class="card"><span class="tag">Opera</span><b>오페라 가수</b><small>배역을 맡아 노래와 연기를 함께 합니다.</small></div><div class="card"><span class="tag teal">Art Song</span><b>가곡 성악가</b><small>시와 음악의 섬세한 표현을 중심으로 노래합니다.</small></div><div class="card"><span class="tag blue">Oratorio</span><b>오라토리오·종교음악</b><small>합창, 독창, 오케스트라가 함께하는 큰 작품에 참여합니다.</small></div><div class="card"><span class="tag">Ensemble</span><b>합창·앙상블</b><small>여러 목소리와 균형을 맞추는 능력이 중요합니다.</small></div></div><div class="panel" style="margin-top:20px"><p class="quote">성악가의 종류는 목소리의 높이와 서 있는 무대, 두 방향으로 이해하면 쉽습니다.</p></div>`],['배역과 음역','08',`<div class="split"><div><p class="title">오페라에서는 목소리가 캐릭터가 됩니다</p><p class="lead">작곡가는 인물의 성격과 장면의 분위기에 맞춰 음역을 선택합니다. 그래서 목소리는 단순한 높낮이가 아니라 인물의 색깔이 됩니다.</p></div><div class="grid two"><div class="card center"><b>소프라노</b><small>순수함, 사랑, 비극의 주인공</small></div><div class="card center"><b>테너</b><small>젊은 남자 주인공, 영웅, 연인</small></div><div class="card center"><b>바리톤</b><small>현실적인 인물, 친구, 갈등의 중심</small></div><div class="card center"><b>베이스</b><small>권위, 깊이, 신비로운 분위기</small></div></div></div>`],['훈련','09',`<p class="title">성악가는 무엇을 연습할까?</p><p class="lead">성악 훈련은 단기간에 완성되지 않습니다. 매일 몸을 악기처럼 다루는 습관이 필요합니다.</p><div class="grid two"><div class="card"><span class="tag">매일</span><b>발성 연습</b><small>낮은 음에서 높은 음까지 천천히 연결하며 소리를 정리합니다.</small></div><div class="card"><span class="tag teal">작품</span><b>가사와 악보 분석</b><small>어떤 단어를 강조할지, 감정이 어디서 변하는지 해석합니다.</small></div><div class="card"><span class="tag blue">무대</span><b>연기와 움직임</b><small>오페라에서는 노래하는 동시에 배역의 행동을 보여줘야 합니다.</small></div><div class="card"><span class="tag">관리</span><b>컨디션 유지</b><small>목을 무리하게 쓰지 않고, 수면과 체력을 관리합니다.</small></div></div>`],['대표 사례','10',`<div class="split"><div><p class="title">루치아노 파바로티</p><p class="lead">이탈리아 출신의 세계적인 테너입니다. 오페라 무대뿐 아니라 대형 공연과 방송을 통해 성악을 대중에게 널리 알렸습니다.</p><div class="panel" style="margin-top:22px"><p class="big">파바로티 = 테너 성악가의 대표 사례</p><p class="body">밝고 멀리 뻗는 고음, 또렷한 발음, 관객에게 쉽게 다가가는 무대성이 강점이었습니다.</p></div></div><img class="photo" src="${img2}"></div>`],['인물 흐름','11',`<p class="title">파바로티의 삶을 4단계로 보기</p><p class="lead">한 사람의 경력을 보면 성악가가 어떻게 훈련과 무대를 통해 성장하는지 이해할 수 있습니다.</p><div class="timeline"><div class="event"><div class="year">1935</div><b>이탈리아 모데나 출생</b><p>음악이 가까운 환경에서 자라며 성악을 배우기 시작했습니다.</p></div><div class="event"><div class="year">1961</div><b>오페라 데뷔</b><p>라 보엠의 로돌포 역으로 무대에 서며 테너 경력을 시작했습니다.</p></div><div class="event"><div class="year">1990</div><b>쓰리 테너와 대중화</b><p>월드컵 시기 공연을 계기로 성악이 더 널리 알려졌습니다.</p></div><div class="event"><div class="year">2007</div><b>세상을 떠남</b><p>지금도 대표적인 테너 성악가로 기억됩니다.</p></div></div>`],['목소리 분석','12',`<div class="split wide"><div><p class="title">파바로티 목소리의 특징</p><p class="lead">그의 장점은 단순히 큰 고음이 아니라, 고음에서도 밝고 안정적으로 들리는 소리였습니다.</p><div class="grid two"><div class="card"><b>밝은 음색</b><small>소리가 어둡게 뭉치지 않고 선명하게 전달됩니다.</small></div><div class="card"><b>또렷한 발음</b><small>가사의 의미가 비교적 쉽게 닿습니다.</small></div><div class="card"><b>강한 고음</b><small>클라이맥스에서 감정의 폭발을 만듭니다.</small></div><div class="card"><b>친근한 무대성</b><small>클래식이 어렵다는 장벽을 낮추었습니다.</small></div></div></div><img class="photo" src="${img1}"></div>`],['대표곡','13',`<div class="split"><div><p class="title">대표곡: Nessun Dorma</p><p class="lead">푸치니의 오페라 <b>투란도트</b>에 나오는 아리아입니다. 파바로티를 상징하는 곡처럼 알려졌습니다.</p><div class="panel" style="margin-top:22px"><p class="quote">마지막 고음만 기다리지 말고, 감정이 점점 커지는 과정을 들어보면 좋습니다.</p></div></div><img class="photo" src="${img3}"></div>`],['감상 포인트','14',`<p class="title">성악을 들을 때 볼 4가지</p><p class="lead">가사를 전부 몰라도 목소리의 움직임과 감정은 충분히 느낄 수 있습니다.</p><div class="grid four"><div class="card"><span class="tag">01</span><b>호흡</b><small>긴 문장이 끊기지 않고 이어지는가?</small></div><div class="card"><span class="tag teal">02</span><b>음색</b><small>소리가 밝은가, 어두운가, 부드러운가?</small></div><div class="card"><span class="tag blue">03</span><b>크기 변화</b><small>작게 시작해서 어디서 강해지는가?</small></div><div class="card"><span class="tag">04</span><b>감정</b><small>마지막에 어떤 기분이 남는가?</small></div></div>`],['대중화','15',`<div class="split"><div><p class="title">파바로티가 남긴 의미</p><p class="lead">파바로티는 오페라 극장 안의 음악을 더 많은 사람에게 들려준 성악가였습니다.</p><div class="grid two"><div class="card"><b>전문성</b><small>오페라 무대에서 인정받은 테너</small></div><div class="card"><b>대중성</b><small>대형 공연과 방송으로 넓어진 관객층</small></div><div class="card"><b>상징성</b><small>Nessun Dorma로 기억되는 목소리</small></div><div class="card"><b>접근성</b><small>클래식 성악을 친근하게 만든 인물</small></div></div></div><img class="photo" src="${img2}"></div>`],['정리','16',`<p class="title">한 번에 정리하면</p><p class="lead">성악가는 목소리로만 평가되지 않습니다. 소리의 기술, 음악 해석, 언어, 연기, 자기 관리가 함께 필요합니다.</p><div class="grid three"><div class="card center"><span class="tag">정의</span><b>몸이 악기다</b><small>호흡과 울림으로 공간을 채운다.</small></div><div class="card center"><span class="tag teal">종류</span><b>목소리마다 역할이 다르다</b><small>소프라노, 테너, 바리톤, 베이스 등</small></div><div class="card center"><span class="tag blue">사례</span><b>파바로티는 대표 테너다</b><small>성악을 대중에게 넓힌 인물</small></div></div><div class="panel" style="margin-top:22px"><p class="quote">성악가는 노래하는 사람을 넘어, 목소리로 장면을 만드는 예술가라고 할 수 있습니다.</p></div>`],['마무리','17',`<div class="split"><div><p class="title">성악가를 알면<br>목소리가 다르게 들립니다</p><p class="lead">이제 성악을 들을 때 단순히 고음만 보는 것이 아니라, 호흡·울림·가사·감정이 어떻게 합쳐지는지 볼 수 있습니다.</p></div><div class="panel"><p class="big">파바로티는 그 모든 요소를 대중에게 강하게 보여준 테너였습니다.</p><p class="body">그의 목소리가 오래 기억되는 이유도, 성악가의 기술과 감정 표현이 동시에 느껴지기 때문입니다.</p></div></div>`],['출처','18',`<p class="title">출처</p><p class="lead">사용한 이미지와 기본 정보 출처입니다.</p><div style="margin-top:18px"><div class="source"><div class="year">01</div><b>Luciano Pavarotti, opera star</b><div>Library of Congress / Bernard Gotfryd<br>Public domain</div><div class="url">https://commons.wikimedia.org/wiki/File:Luciano_Pavarotti,_opera_star.jpg</div></div><div class="source"><div class="year">02</div><b>Luciano Pavarotti 2004</b><div>Kingkongphoto & celebrity-photos.com<br>CC BY-SA 2.0</div><div class="url">https://commons.wikimedia.org/wiki/File:Luciano_Pavarotti_2004.jpg</div></div><div class="source"><div class="year">03</div><b>Luciano Pavarotti in Saint Petersburg</b><div>Kremlin.ru<br>CC BY 3.0 / CC BY 4.0</div><div class="url">https://commons.wikimedia.org/wiki/File:Luciano_Pavarotti_in_Saint_Petersburg.jpg</div></div><div class="source"><div class="year">04</div><b>Satoru Gojo character visual</b><div>TV anime Jujutsu Kaisen official site<br>© Gege Akutami / Shueisha, Jujutsu Kaisen Production Committee</div><div class="url">https://jujutsukaisen.jp/character/category6.php<br>https://jujutsukaisen.jp/images/chara_category6/chara_detail1_2nd.png</div></div><div class="source"><div class="year">05</div><b>Pavarotti biography</b><div>Britannica, Pavarotti Official, Wikimedia Commons</div><div class="url">https://www.britannica.com/biography/Luciano-Pavarotti<br>https://www.pavarottiofficial.com/</div></div></div>`]];const s=document.getElementById('s');let i=0;function show(n){i=(n+slides.length)%slides.length;let a=slides[i];s.innerHTML=`<div class="inner"><div><div class="k">${a[1]?`<span class="n">${a[1]}</span>`:''}${a[0]}</div></div><div>${a[2]}</div><div class="page">${i+1} / ${slides.length}</div></div>`}function full(){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.()}prev.onclick=()=>show(i-1);next.onclick=()=>show(i+1);s.onclick=e=>{const x=e.clientX/window.innerWidth;if(x>.58)show(i+1);else if(x<.42)show(i-1)};addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='ArrowUp')show(i-1);if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();show(i+1)}if(e.key.toLowerCase()==='f')full()});s.ondblclick=full;show(0);</script></body></html>
