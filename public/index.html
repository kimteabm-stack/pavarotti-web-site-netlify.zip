<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>10208 김태범 발표 - 성악가란 무엇일까?</title><style>@import url(https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css);*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f7f7f1;color:#101010;font-family:Pretendard,Malgun Gothic,sans-serif;word-break:keep-all}.slide{width:100vw;height:100vh;position:relative;overflow:hidden;background:linear-gradient(115deg,#fffdf7,#ededE7)}.slide:before{content:"";position:absolute;inset:0;background-image:radial-gradient(#111 .75px,transparent .9px);background-size:8px 8px;opacity:.05}.slide:after{content:"";position:absolute;right:-7vw;top:-18vh;width:46vw;height:46vw;border:3px solid #111;border-radius:50%;opacity:.055}.inner{position:relative;z-index:2;height:100%;padding:5.2vh 6vw;display:grid;grid-template-rows:auto 1fr}.kicker{display:flex;gap:12px;align-items:center;font-size:15px;font-weight:950}.num{background:#111;color:#fff;border:2px solid #111;padding:7px 13px;box-shadow:4px 4px 0 #d8d8d0}.content{height:100%;display:grid;align-items:center}.title{margin:0 0 1.6vh;font-size:clamp(44px,5.1vw,82px);line-height:1.04;font-weight:950}.lead{margin:0;color:#3d3d3d;font-size:clamp(19px,1.75vw,28px);line-height:1.48;font-weight:750}.page{position:absolute;right:4vw;bottom:3vh;font-size:13px;font-weight:950}.nav{position:fixed;z-index:8;top:50%;transform:translateY(-50%);width:44px;height:68px;border:2px solid #111;background:#fffff9cc;font-size:34px;font-weight:950;cursor:pointer;box-shadow:5px 5px 0 #0002}.nav:hover{background:#111;color:#fff}.prev{left:14px}.next{right:14px}.cover,.split{display:grid;grid-template-columns:1.02fr .98fr;gap:4vw;align-items:center}.wide{grid-template-columns:1.14fr .86fr}.label,.tag{display:inline-flex;border:2px solid #111;font-weight:950}.label{background:#fff;padding:10px 15px;box-shadow:5px 5px 0 #d8d8d0}.tag{width:max-content;background:#111;color:#fff;padding:6px 10px;font-size:14px}.light{background:#fff;color:#111}.photo{width:100%;height:58vh;object-fit:cover;border:4px solid #111;box-shadow:12px 12px 0 #0002;filter:grayscale(1) contrast(1.08)}.coverArt{position:relative;height:72vh}.coverArt:before{content:"";position:absolute;right:4%;top:3%;width:62%;height:88%;border:3px solid #111;background:repeating-linear-gradient(90deg,#0001 0 1px,transparent 1px 22px),#f5f5ef;transform:rotate(2deg);box-shadow:10px 10px 0 #0002}.coverArt .gojo{position:absolute;right:-2%;top:9%;width:44%;height:78%;object-fit:contain;opacity:.18;filter:grayscale(1) contrast(1.3);mix-blend-mode:multiply}.coverArt .photo{position:absolute;left:0;top:8%;width:76%;height:84%;z-index:2}.panel,.card,.step,.event,.voice{border:3px solid #111;background:#fffefa;box-shadow:7px 7px 0 #0002}.panel{padding:30px}.shade{background:radial-gradient(#111 .75px,transparent 1px) 0 0/7px 7px,#f5f5ef}.big,.quote{margin:0;font-size:clamp(30px,3.1vw,50px);line-height:1.25;font-weight:950}.body{margin:15px 0 0;color:#444;font-size:clamp(17px,1.5vw,24px);line-height:1.48;font-weight:650}.grid{display:grid;gap:18px;margin-top:3vh}.two{grid-template-columns:repeat(2,1fr)}.three{grid-template-columns:repeat(3,1fr)}.four{grid-template-columns:repeat(4,1fr)}.card{min-height:145px;padding:22px;display:grid;gap:10px;align-content:start}.card:nth-child(even){background:repeating-linear-gradient(-45deg,#0000000e 0 2px,transparent 2px 9px),#fffefa}.center{text-align:center;align-content:center}.card b{font-size:clamp(21px,1.9vw,30px);line-height:1.22;font-weight:950}.card small{font-size:clamp(15px,1.28vw,20px);line-height:1.42;color:#444;font-weight:650}.steps,.timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:3vh}.step,.event{min-height:205px;padding:23px}.step span,.year{display:inline-block;font:950 32px Georgia,serif;border-bottom:8px solid #ccc}.step b,.event b{display:block;margin:16px 0 8px;font-size:clamp(21px,1.8vw,28px);font-weight:950}.step p,.event p{margin:0;color:#444;font-size:clamp(15px,1.15vw,19px);line-height:1.42;font-weight:650}.voices{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:2.5vh}.voice{display:grid;grid-template-columns:76px 1fr;gap:16px;align-items:center;padding:16px}.letter{height:60px;border:3px solid #111;background:#111;color:#fff;display:grid;place-items:center;font:950 24px Georgia,serif}.burst{border:3px solid #111;background:#fff;padding:32px;clip-path:polygon(4% 0,15% 5%,27% 0,38% 6%,51% 0,60% 7%,73% 2%,84% 8%,100% 3%,94% 18%,100% 31%,92% 42%,99% 56%,91% 68%,97% 84%,82% 89%,73% 100%,58% 93%,45% 100%,33% 92%,17% 98%,10% 84%,0 77%,8% 63%,0 50%,8% 36%,0 24%,9% 13%)}.g{position:absolute;z-index:1;pointer-events:none;border:3px solid #111;background:#fff;padding:5px;box-shadow:8px 8px 0 #0002;opacity:.12;filter:grayscale(1) contrast(1.55);mix-blend-mode:multiply;overflow:hidden}.g img{width:100%;height:100%;object-fit:cover}.g1{right:3vw;top:10vh;width:14vw;height:22vh;transform:rotate(2deg)}.g2{left:4vw;bottom:6vh;width:12vw;height:18vh;transform:rotate(-3deg)}.g3{right:20vw;bottom:5vh;width:10vw;height:20vh;transform:rotate(4deg)}.thanks{display:grid;place-items:center;text-align:center}.thanks h1{margin:0;font-size:clamp(86px,11vw,170px);line-height:.95;font-weight:950}.thanks p{margin:20px 0 0;font-size:clamp(22px,2vw,34px);font-weight:900}.source{display:grid;grid-template-columns:50px 1fr 1fr 1.6fr;gap:14px;border-bottom:2px solid #ccc;padding:12px 0}.source b{font-size:18px}.source div{font-size:14px;line-height:1.35;color:#444}.url{word-break:break-all;font-size:12px!important}@media(max-width:900px){body{overflow:auto}.slide{height:auto;min-height:100vh}.inner{min-height:100vh;padding:32px 24px 58px 38px}.cover,.split,.wide,.two,.three,.four,.steps,.timeline,.voices{grid-template-columns:1fr}.photo{height:300px}.coverArt{height:360px}.g{opacity:.075}.g2,.g3{display:none}.source{grid-template-columns:1fr}.nav{top:auto;bottom:14px;width:46px;height:46px}.page{right:22px;bottom:18px}}</style></head><body><section id="slide" class="slide"></section><button class="nav prev" id="prev">‹</button><button class="nav next" id="next">›</button><script>const P1='https://upload.wikimedia.org/wikipedia/commons/5/54/Luciano_Pavarotti%2C_opera_star.jpg',P2='https://upload.wikimedia.org/wikipedia/commons/0/09/Luciano_Pavarotti_2004.jpg',P3='https://upload.wikimedia.org/wikipedia/commons/d/d9/Luciano_Pavarotti_in_Saint_Petersburg.jpg';const G=['https://jujutsukaisen.jp/images/chara_category6/chara_detail1_2nd.png','https://jujutsukaisen.jp/bddvd/images/2nd/tokuten_early_vol1.jpg','https://jujutsukaisen.jp/bddvd/images/2nd/tokuten_animate_2.jpg','https://jujutsukaisen.jp/bddvd/images/2nd/tokuten_tas_1.jpg','https://jujutsukaisen.jp/bddvd/images/2nd/tokuten_rakuten_1.jpg','https://jujutsukaisen.jp/bddvd/images/2nd/tokuten_amazon.jpg','https://jujutsukaisen.jp/bddvd/images/2nd/tokuten_mappa_3.jpg','https://jujutsukaisen.jp/bddvd/images/2nd/tokuten_early_vol1_shibuyajihen.jpg'];const slides=[['10208 김태범 발표','',`<div class='cover'><div><span class='label'>성악의 세계</span><p class='title'>성악가란<br>무엇일까?</p><p class='lead'>루치아노 파바로티를 대표 사례로 보면서 성악가가 하는 일, 필요한 역량, 성악가 안의 종류를 고1 수준에서 쉽게 살펴봅니다.</p></div><div class='coverArt'><img class='gojo' src='${G[0]}'><img class='photo' src='${P1}'></div></div>`],['목차','01',`<p class='title'>목차</p><p class='lead'>성악가의 의미부터 필수 역량, 성악가의 종류, 파바로티 사례와 감상 포인트까지 차례로 살펴봅니다.</p><div class='grid three'><div class='card'><span class='tag'>1</span><b>성악가의 의미</b><small>목소리를 악기로 쓰는 직업</small></div><div class='card'><span class='tag light'>2</span><b>필수 역량</b><small>호흡, 발성, 언어, 해석, 무대 표현</small></div><div class='card'><span class='tag'>3</span><b>성악가의 종류</b><small>음역과 활동 분야</small></div><div class='card'><span class='tag light'>4</span><b>파바로티</b><small>대표적인 테너 사례</small></div><div class='card'><span class='tag'>5</span><b>감상 포인트</b><small>Nessun Dorma 듣기</small></div><div class='card'><span class='tag light'>6</span><b>마무리</b><small>성악가의 의미 정리</small></div></div>`],['기본 개념','02',`<div class='split'><div><p class='title'>성악가는 목소리를 악기로 쓰는 사람</p><p class='lead'>성악은 사람의 목소리로 음악을 표현하는 예술입니다. 성악가는 훈련된 발성과 표현으로 노래 속 인물, 감정, 이야기를 관객에게 전달합니다.</p></div><div class='panel shade'><p class='big'>몸이 악기이고, 무대가 악보의 마지막 장면입니다.</p><p class='body'>그래서 성악가는 노래 실력뿐 아니라 몸 관리, 언어 이해, 연기력까지 함께 갖춰야 합니다.</p></div></div>`],['하는 일','03',`<p class='title'>성악가는 무대에서 무엇을 할까?</p><p class='lead'>작품을 분석하고, 목소리를 관리하고, 관객 앞에서 인물을 살아 움직이게 만듭니다.</p><div class='steps'><div class='step'><span>01</span><b>악보 분석</b><p>가사와 작곡가의 의도를 읽습니다.</p></div><div class='step'><span>02</span><b>발성 훈련</b><p>마이크 없이도 울리는 소리를 만듭니다.</p></div><div class='step'><span>03</span><b>무대 표현</b><p>노래, 시선, 동선까지 보여줍니다.</p></div><div class='step'><span>04</span><b>공연 준비</b><p>리허설과 지휘자와의 호흡을 맞춥니다.</p></div></div>`],['필수 역량','04',`<p class='title'>성악가에게 필요한 필수 역량</p><p class='lead'>좋은 목소리만으로는 부족합니다. 기술, 이해력, 표현력, 자기 관리가 함께 움직여야 합니다.</p><div class='grid three'><div class='card'><span class='tag'>Breath</span><b>호흡 조절</b><small>긴 문장을 안정적으로 이어갑니다.</small></div><div class='card'><span class='tag light'>Tone</span><b>발성·공명</b><small>멀리 전달되는 울림을 만듭니다.</small></div><div class='card'><span class='tag'>Pitch</span><b>음정·리듬</b><small>오케스트라와 정확히 맞춥니다.</small></div><div class='card'><span class='tag light'>Language</span><b>언어 능력</b><small>이탈리아어, 독일어, 프랑스어 가사를 전달합니다.</small></div><div class='card'><span class='tag'>Acting</span><b>감정·연기</b><small>인물의 감정을 관객이 느끼게 합니다.</small></div><div class='card'><span class='tag light'>Care</span><b>자기 관리</b><small>목 건강, 체력, 수면을 관리합니다.</small></div></div>`],['목소리 관리','05',`<div class='split wide'><div><p class='title'>목소리는 관리가 중요합니다</p><p class='lead'>운동선수가 몸을 관리하듯 성악가는 목 상태와 호흡, 자세를 매일 점검합니다.</p><div class='grid two'><div class='card'><b>워밍업</b><small>가볍게 몸과 목을 깨웁니다.</small></div><div class='card'><b>무리하지 않기</b><small>피로와 수면 부족은 목소리에 바로 영향을 줍니다.</small></div><div class='card'><b>꾸준한 레슨</b><small>잘못된 발성 습관을 고칩니다.</small></div><div class='card'><b>공연 체력</b><small>긴 시간 움직이며 노래할 힘이 필요합니다.</small></div></div></div><div class='burst'><p class='quote'>성악가에게 목은 악기이자 몸 전체의 결과입니다.</p></div></div>`],['성악가의 종류','06',`<p class='title'>음역에 따른 성악가의 종류</p><p class='lead'>목소리의 높낮이와 색깔에 따라 역할이 나뉩니다. 파바로티는 높은 남성 음역인 테너입니다.</p><div class='voices'><div class='voice'><div class='letter'>S</div><div><b>소프라노</b><small>가장 높은 여성 음역</small></div></div><div class='voice'><div class='letter'>M</div><div><b>메조소프라노</b><small>중간 여성 음역</small></div></div><div class='voice'><div class='letter'>A</div><div><b>알토</b><small>낮은 여성 음역</small></div></div><div class='voice'><div class='letter'>T</div><div><b>테너</b><small>높은 남성 음역</small></div></div><div class='voice'><div class='letter'>B</div><div><b>바리톤</b><small>중간 남성 음역</small></div></div><div class='voice'><div class='letter'>Bs</div><div><b>베이스</b><small>가장 낮은 남성 음역</small></div></div></div>`],['활동 분야','07',`<p class='title'>무대에 따라 달라지는 성악가</p><p class='lead'>작품의 성격에 따라 준비 방식과 표현도 달라집니다.</p><div class='grid four'><div class='card'><span class='tag'>Opera</span><b>오페라 가수</b><small>배역을 맡아 노래와 연기를 함께 합니다.</small></div><div class='card'><span class='tag light'>Art Song</span><b>가곡 성악가</b><small>시와 음악의 섬세한 감정을 표현합니다.</small></div><div class='card'><span class='tag'>Oratorio</span><b>오라토리오</b><small>합창, 오케스트라와 함께 부릅니다.</small></div><div class='card'><span class='tag light'>Ensemble</span><b>합창·앙상블</b><small>여러 목소리의 균형을 맞춥니다.</small></div></div>`],['오페라 속 역할','08',`<div class='split'><div><p class='title'>목소리가 캐릭터가 됩니다</p><p class='lead'>작곡가는 인물의 성격과 장면의 분위기에 맞춰 음역을 선택합니다.</p></div><div class='grid two'><div class='card center'><b>소프라노</b><small>순수한 사랑, 비극의 주인공</small></div><div class='card center'><b>테너</b><small>젊은 남자 주인공, 영웅, 연인</small></div><div class='card center'><b>바리톤</b><small>현실적인 인물, 갈등의 중심</small></div><div class='card center'><b>베이스</b><small>권위, 깊이, 신비로운 분위기</small></div></div></div>`],['성악가가 되는 길','09',`<p class='title'>성악가는 어떻게 성장할까?</p><p class='lead'>재능이 출발점이 될 수는 있지만 오랜 훈련과 무대 경험이 필요합니다.</p><div class='timeline'><div class='event'><div class='year'>1</div><b>기초 발성</b><p>자세와 호흡을 배웁니다.</p></div><div class='event'><div class='year'>2</div><b>레퍼토리</b><p>자신에게 맞는 곡을 쌓습니다.</p></div><div class='event'><div class='year'>3</div><b>언어와 해석</b><p>가사의 의미를 이해합니다.</p></div><div class='event'><div class='year'>4</div><b>오디션·공연</b><p>무대 경험을 쌓습니다.</p></div></div>`],['대표 사례','10',`<div class='split'><div><p class='title'>루치아노 파바로티</p><p class='lead'>이탈리아 출신의 세계적인 테너입니다. 오페라 극장뿐 아니라 대형 공연과 방송을 통해 성악을 대중에게 널리 알렸습니다.</p><div class='panel' style='margin-top:3vh'><p class='big'>파바로티 = 테너 성악가의 대표 사례</p><p class='body'>밝고 멀리 뻗는 고음, 또렷한 발음, 관객에게 강하게 다가가는 무대성이 장점이었습니다.</p></div></div><img class='photo' src='${P2}'></div>`],['인물 흐름','11',`<p class='title'>파바로티의 삶을 4단계로 보기</p><p class='lead'>한 성악가의 경력을 보면 훈련, 데뷔, 대중화, 기억되는 작품이 이어지는 과정을 볼 수 있습니다.</p><div class='timeline'><div class='event'><div class='year'>1935</div><b>모데나 출생</b><p>음악이 가까운 환경에서 자랐습니다.</p></div><div class='event'><div class='year'>1961</div><b>오페라 데뷔</b><p>테너 경력을 시작했습니다.</p></div><div class='event'><div class='year'>1990</div><b>대중적 인기</b><p>Three Tenors 활동으로 성악을 널리 알렸습니다.</p></div><div class='event'><div class='year'>2007</div><b>전설로 기억</b><p>대표적인 테너로 남았습니다.</p></div></div>`],['목소리 분석','12',`<div class='split wide'><div><p class='title'>파바로티 목소리의 특징</p><p class='lead'>고음에서도 밝고 안정적으로 뻗어 나가는 소리가 강점이었습니다.</p><div class='grid two'><div class='card'><b>밝은 음색</b><small>선명하게 전달됩니다.</small></div><div class='card'><b>또렷한 발음</b><small>가사의 의미가 쉽게 들립니다.</small></div><div class='card'><b>강한 고음</b><small>감정의 폭발을 만듭니다.</small></div><div class='card'><b>친근한 무대성</b><small>클래식의 장벽을 낮췄습니다.</small></div></div></div><div class='panel shade'><p class='quote'>좋은 성악은 소리가 큰 것보다 끝까지 흔들리지 않는 힘이 중요합니다.</p></div></div>`],['대표곡','13',`<div class='split'><div><p class='title'>대표곡: Nessun Dorma</p><p class='lead'>푸치니의 오페라 <b>투란도트</b>에 나오는 아리아입니다. 파바로티를 상징하는 곡처럼 널리 알려졌습니다.</p><div class='panel' style='margin-top:3vh'><p class='quote'>마지막 고음만 기다리지 말고 감정이 점점 커지는 과정을 들어보면 좋습니다.</p></div></div><img class='photo' src='${P3}'></div>`],['감상 포인트','14',`<p class='title'>성악을 들을 때 볼 4가지</p><p class='lead'>아래 기준으로 들으면 목소리의 움직임과 감정을 쉽게 느낄 수 있습니다.</p><div class='grid four'><div class='card'><span class='tag'>01</span><b>호흡</b><small>긴 문장이 이어지는가?</small></div><div class='card'><span class='tag light'>02</span><b>음색</b><small>밝은가, 어두운가?</small></div><div class='card'><span class='tag'>03</span><b>크기 변화</b><small>어디서 강해지는가?</small></div><div class='card'><span class='tag light'>04</span><b>감정</b><small>어떤 분위기를 남기는가?</small></div></div>`],['대중화','15',`<p class='title'>파바로티가 특별했던 이유</p><p class='lead'>성악을 전공자만 듣는 음악이 아니라 더 많은 사람이 접할 수 있는 음악으로 보여 주었습니다.</p><div class='grid three'><div class='card'><span class='tag'>전문성</span><b>오페라 무대의 실력</b><small>세계적인 극장에서 인정받은 테너였습니다.</small></div><div class='card'><span class='tag light'>대중성</span><b>대형 공연과 방송</b><small>클래식 밖의 관객에게도 다가갔습니다.</small></div><div class='card'><span class='tag'>상징성</span><b>기억되는 목소리</b><small>Nessun Dorma로 강한 이미지를 남겼습니다.</small></div></div>`],['마무리','16',`<div class='thanks'><div><h1>감사합니다</h1><p>10208 김태범</p><p style='font-size:22px;color:#555'>성악가란 무엇일까?</p></div></div>`],['출처','17',`<p class='title'>이미지 및 자료 출처</p><div><div class='source'><div>01</div><b>Luciano Pavarotti, opera star</b><div>Library of Congress / Bernard Gotfryd<br>Public domain</div><div class='url'>https://commons.wikimedia.org/wiki/File:Luciano_Pavarotti,_opera_star.jpg</div></div><div class='source'><div>02</div><b>Luciano Pavarotti 2004</b><div>Kingkongphoto & celebrity-photos.com<br>CC BY-SA 2.0</div><div class='url'>https://commons.wikimedia.org/wiki/File:Luciano_Pavarotti_2004.jpg</div></div><div class='source'><div>03</div><b>Luciano Pavarotti in Saint Petersburg</b><div>Kremlin.ru<br>CC BY 3.0 / CC BY 4.0</div><div class='url'>https://commons.wikimedia.org/wiki/File:Luciano_Pavarotti_in_Saint_Petersburg.jpg</div></div><div class='source'><div>04</div><b>Jujutsu Kaisen official images</b><div>TV anime Jujutsu Kaisen official site<br>© Gege Akutami / Shueisha</div><div class='url'>https://jujutsukaisen.jp/character/category6.php<br>https://jujutsukaisen.jp/bddvd/tokuten_2nd.php</div></div><div class='source'><div>05</div><b>Pavarotti biography</b><div>Britannica, Pavarotti Official</div><div class='url'>https://www.britannica.com/biography/Luciano-Pavarotti<br>https://www.pavarottiofficial.com/</div></div></div>`]];let idx=0;const el=document.getElementById('slide');function decor(){if(idx===0)return'';let a=(idx*3)%G.length;return`<figure class='g g1'><img src='${G[a]}'></figure><figure class='g g2'><img src='${G[(a+1)%G.length]}'></figure><figure class='g g3'><img src='${G[(a+2)%G.length]}'></figure>`}function show(n){idx=(n+slides.length)%slides.length;let s=slides[idx];el.innerHTML=`${decor()}<div class='inner'><div class='kicker'>${s[1]?`<span class='num'>${s[1]}</span>`:''}<span>${s[0]}</span></div><div class='content'>${s[2]}</div><div class='page'>${idx+1} / ${slides.length}</div></div>`}prev.onclick=()=>show(idx-1);next.onclick=()=>show(idx+1);el.onclick=e=>{let x=e.clientX/innerWidth;if(x>.58)show(idx+1);else if(x<.42)show(idx-1)};addEventListener('keydown',e=>{if(e.key==='ArrowLeft')show(idx-1);if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();show(idx+1)}if(e.key.toLowerCase()==='f')document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.()});show(0)</script></body></html>
