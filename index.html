<!doctype html><html lang='ko'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>10208 김태범 발표 - 성악가란 무엇일까?</title><link rel='stylesheet' href='manga.css?v=20260520i'><link rel='stylesheet' href='accent.css?v=20260520i'><link rel='stylesheet' href='download.css?v=20260520i'></head><body><div class='downloadBar'><button id='downloadPdf' type='button'>PDF</button><button id='downloadPpt' type='button'>PPT</button></div><main id='deck'><section class='slide' id='slide'></section></main><button class='nav prev' id='prev' aria-label='이전 슬라이드'>‹</button><button class='nav next' id='next' aria-label='다음 슬라이드'>›</button><script src='deck.js?v=20260520i'></script><script src='design-patch.js?v=20260520i'></script><script>(function(){const fileBase='10208_김태범_성악가_발표';const esc=s=>String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));function text(html){const box=document.createElement('div');box.innerHTML=html;return box.innerText.replace(/\n{3,}/g,'\n\n').trim()}function exportStyles(){return [...document.querySelectorAll('link[rel="stylesheet"]')].filter(l=>!l.href.includes('download.css')).map(l=>`<link rel="stylesheet" href="${l.href}">`).join('')}function allSlideHtml(){return slides.map((s,i)=>`<section class="slide"><div class="inner"><div class="kicker">${s.n?`<span class="num">${s.n}</span>`:''}<span>${s.k}</span></div><div class="content">${s.h}</div><div class="pageNo">${i+1} / ${slides.length}</div><div class="shapeLayer v${i%5}"><span class="shape ring"></span><span class="shape square"></span><span class="shape slab"></span><span class="shape staff"></span><span class="shape note"></span></div></div></section>`).join('')}function savePdf(){const w=window.open('','_blank');if(!w){alert('팝업이 막혔습니다. 팝업 허용 후 다시 눌러주세요.');return}w.document.open();w.document.write(`<!doctype html><html lang="ko"><head><meta charset="utf-8"><title>${fileBase} PDF</title>${exportStyles()}<style>html,body{overflow:visible!important;background:#f7f7f1}.slide{page-break-after:always;break-after:page}.slide:last-child{page-break-after:auto;break-after:auto}@page{size:landscape;margin:0}.nav,.downloadBar{display:none!important}</style></head><body>${allSlideHtml()}<script>setTimeout(function(){print()},700)<\/script></body></html>`);w.document.close()}function pptSlide(s,i){const lines=text(s.h).split('\n').map(v=>v.trim()).filter(Boolean).filter(v=>!/^\d+\s*\/\s*\d+$/.test(v)).filter(v=>!['OPERA','VOICE'].includes(v));const title=lines[0]||s.k||'';const body=lines.slice(1,9).map(v=>`<p>${esc(v)}</p>`).join('');return `<section class="pptSlide"><div class="kicker">${esc(String(i+1).padStart(2,'0'))} ${esc(s.k||'')}</div><h1>${esc(title)}</h1><div class="body">${body}</div><div class="page">${i+1} / ${slides.length}</div></section>`}function savePpt(){try{const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:p="urn:schemas-microsoft-com:office:powerpoint" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>${fileBase}</title><style>@page{size:13.333in 7.5in;margin:.45in}.pptSlide{page-break-after:always;width:12.4in;height:6.6in;box-sizing:border-box;background:#f7f7f1;color:#111;font-family:'Malgun Gothic',Arial,sans-serif;position:relative;padding:.25in .35in}.kicker{font-size:12pt;font-weight:700;color:#555;margin-bottom:.5in}h1{font-size:34pt;line-height:1.08;margin:0 0 .35in 0;font-weight:900}.body{font-size:18pt;line-height:1.38;color:#333;max-width:10.8in}.body p{margin:0 0 .14in 0}.page{position:absolute;right:.35in;bottom:.25in;font-size:10pt;font-weight:700}.pptSlide:before{content:'';position:absolute;right:.5in;top:.25in;width:2.6in;height:2.6in;border:2px solid #d8d8d0;border-radius:50%}.pptSlide:after{content:'';position:absolute;left:.35in;bottom:.35in;width:1.1in;height:.16in;background:#111;transform:rotate(-5deg)}</style></head><body>${slides.map(pptSlide).join('')}</body></html>`;const blob=new Blob([html],{type:'application/vnd.ms-powerpoint;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fileBase+'.ppt';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}catch(e){console.error(e);alert('PPT 다운로드 중 문제가 생겼습니다. 새로고침 후 다시 눌러주세요.')}}document.getElementById('downloadPdf')?.addEventListener('click',savePdf);document.getElementById('downloadPpt')?.addEventListener('click',savePpt);window.deckExportReady=true;})();</script></body></html>
